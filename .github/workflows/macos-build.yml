name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13         # Intel
            arch_label: mac_intel
          - runner: macos-14         # Apple Silicon
            arch_label: mac_apple_silicon

    runs-on: ${{ matrix.runner }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps (project + runtime + packager)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pandas xlsxwriter openpyxl python-dotenv requests

      - name: Clean
        run: |
          rm -rf build dist "RV Prospector.spec"

      - name: Smoke test
        run: |
          python -c "import rvprospector; print('rvprospector import OK')"

      - name: Build .app (bundle)
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --name "RV Prospector" \
            --paths "./src" \
            --collect-data pandas \
            --collect-data xlsxwriter \
            --hidden-import dotenv \
            ./gui_entry.py

      - name: Ad-hoc codesign (optional)
        run: |
          codesign --force --deep --sign - "dist/RV Prospector.app" || true

      - name: Zip .app
        working-directory: dist
        run: |
          ditto -c -k --sequesterRsrc --keepParent "RV Prospector.app" "RV_Prospector_${{ matrix.arch_label }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RV_Prospector_${{ matrix.arch_label }}
          path: dist/RV_Prospector_${{ matrix.arch_label }}.zip
          if-no-files-found: error
