name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas python-dotenv openpyxl xlsxwriter requests

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed gui_entry.py --name "RV Prospector"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RV_Prospector_Windows
          path: dist/RV Prospector.exe
