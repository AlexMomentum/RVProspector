name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (project + runtime + packager)
        run: |
          python -m pip install --upgrade pip
          pip install -e .                # <-- makes "rvprospector" importable
          pip install pyinstaller pandas xlsxwriter openpyxl python-dotenv requests

      - name: Clean
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path "RV Prospector.spec") { Remove-Item -Force "RV Prospector.spec" }

      - name: Build .exe
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "RV Prospector" `
            --paths "./src" `                 # <-- find your package during build
            --collect-data pandas `
            --collect-data xlsxwriter `
            --hidden-import dotenv `
            .\gui_entry.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RV_Prospector_Windows
          path: dist/RV Prospector.exe
          if-no-files-found: error
